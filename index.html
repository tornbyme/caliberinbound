<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caliber Inbound</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }


:root {
  --black: #0a0a0a;
  --white: #f5f3ef;
  --accent: #c8a96e;
  --mid: #1e1e1e;
  --muted: #6b6660;
}

html, body {
  height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 100;
  opacity: 0.35;
}

/* Subtle grid lines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(200,169,110,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,169,110,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  height: 100vh;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: clamp(24px, 4vw, 56px);
}

/* ── HEADER ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.1s forwards;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(22px, 2.4vw, 30px);
  letter-spacing: 0.18em;
  color: var(--white);
}

.logo span {
  color: var(--accent);
}

.badge {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  border: 1px solid var(--mid);
  padding: 6px 14px;
  border-radius: 2px;
}

/* ── CENTER ── */
.center {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  gap: 32px;
  max-width: 820px;
}

.eyebrow {
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.3s forwards;
}

.eyebrow-line {
  width: 36px;
  height: 1px;
  background: var(--accent);
}

.eyebrow-text {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--accent);
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(64px, 10vw, 140px);
  line-height: 0.92;
  letter-spacing: 0.02em;
  color: var(--white);
  opacity: 0;
  animation: fadeUp 0.9s ease 0.45s forwards;
}

h1 em {
  font-style: normal;
  color: var(--accent);
}

.subtext {
  font-size: clamp(15px, 1.4vw, 18px);
  font-weight: 300;
  color: var(--muted);
  line-height: 1.7;
  max-width: 480px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.65s forwards;
}

/* Notify form */
.notify-form {
  display: flex;
  gap: 0;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.85s forwards;
}

.notify-form input {
  background: var(--mid);
  border: 1px solid #2e2e2e;
  border-right: none;
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 14px 20px;
  width: 260px;
  outline: none;
  transition: border-color 0.2s;
  border-radius: 2px 0 0 2px;
}

.notify-form input::placeholder { color: var(--muted); }
.notify-form input:focus { border-color: var(--accent); }

.notify-form button {
  background: var(--accent);
  color: var(--black);
  border: none;
  padding: 14px 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 0 2px 2px 0;
  transition: opacity 0.2s, transform 0.15s;
  white-space: nowrap;
}

.notify-form button:hover { opacity: 0.88; transform: translateX(1px); }

.confirm-msg {
  display: none;
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.08em;
  padding: 14px 0;
}

/* ── FOOTER ── */
footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  opacity: 0;
  animation: fadeUp 0.8s ease 1s forwards;
}

.footer-left {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.08em;
}

/* Decorative vertical rule */
.vr {
  position: fixed;
  right: clamp(24px, 4vw, 56px);
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  opacity: 0;
  animation: fadeIn 1.2s ease 1.1s forwards;
}

.vr-line {
  width: 1px;
  height: 80px;
  background: linear-gradient(to bottom, transparent, var(--accent), transparent);
}

.vr-text {
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
  writing-mode: vertical-rl;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .vr { display: none; }
  .notify-form { flex-direction: column; }
  .notify-form input { border-right: 1px solid #2e2e2e; border-bottom: none; border-radius: 2px 2px 0 0; width: 100%; }
  .notify-form button { border-radius: 0 0 2px 2px; }
  .badge { display: none; }
}


  </style>
</head>
<body>

<div class="page">

  <header>
    <div class="logo">CALIBER<span>.</span>INBOUND</div>
    <div class="badge">Applications Closed</div>
  </header>

  <main class="center">
    <div class="eyebrow">
      <div class="eyebrow-line"></div>
      <div class="eyebrow-text">Next Cohort</div>
    </div>


<h1>STAY<br/><em>TUNED.</em></h1>

<p class="subtext">
  Applications for the current cycle are now closed. Something bigger is coming — drop your email and you'll be the first to know when doors reopen.
</p>

<div class="notify-form" id="formWrap">
  <input type="email" id="emailInput" placeholder="your@email.com" />
  <button onclick="handleSubmit()">Notify Me</button>
</div>
<div class="confirm-msg" id="confirmMsg">✦ &nbsp;You're on the list. We'll be in touch.</div>


  </main>

  <footer>
    <div class="footer-left">© 2026 Caliber Inbound</div>
  </footer>

</div>

<div class="vr">
  <div class="vr-line"></div>
  <div class="vr-text">Coming Soon</div>
  <div class="vr-line"></div>
</div>

<script>
  function handleSubmit() {
    const input = document.getElementById('emailInput');
    const form = document.getElementById('formWrap');
    const msg = document.getElementById('confirmMsg');
    if (!input.value || !input.value.includes('@')) {
      input.style.borderColor = '#a05050';
      setTimeout(() => input.style.borderColor = '#2e2e2e', 1200);
      return;
    }
    form.style.display = 'none';
    msg.style.display = 'block';
  }

  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>

</body>
</html>
